version: 0.0
os: linux

files:
  - source: app.jar
    destination: /opt/covid19map/deployment
    overwrite: true

hooks:
  ApplicationStop:
    - location: scripts/stop_application.sh
      timeout: 120
      runas: root
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 120
      runas: root
