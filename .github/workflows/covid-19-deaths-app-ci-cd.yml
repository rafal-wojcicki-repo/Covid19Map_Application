name: Covid19Map CI/CD (Maven + AWS CodeDeploy)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_to_aws:
        description: "Deploy build artifact to AWS CodeDeploy"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test (Java 11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error

  deploy-codedeploy-aws:
    name: Deploy artifact to AWS via CodeDeploy
    runs-on: ubuntu-latest
    needs: build-test
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_to_aws == 'true')
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20
    environment:
      name: production

    # UZUPEŁNIJ w GitHub -> Settings -> Secrets and variables -> Actions:
    # 1) Secret:
    #    - AWS_ROLE_TO_ASSUME -> output github_actions_role_to_assume z Terraforma.
    # 2) Vars:
    #    - AWS_REGION -> output github_actions_configuration.vars.AWS_REGION.
    #    - CODEDEPLOY_APPLICATION_NAME -> output codedeploy_application_name.
    #    - CODEDEPLOY_DEPLOYMENT_GROUP -> output codedeploy_deployment_group_name.
    #    - CODEDEPLOY_ARTIFACT_BUCKET -> output codedeploy_artifact_bucket_name.
    #    - CODEDEPLOY_ARTIFACT_PREFIX -> opcjonalnie, np. covid19map/dev.
    # - Utwórz Environment "production" z required reviewers dla ręcznej akceptacji deployu.
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CODEDEPLOY_APPLICATION_NAME: ${{ vars.CODEDEPLOY_APPLICATION_NAME }}
      CODEDEPLOY_DEPLOYMENT_GROUP: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP }}
      CODEDEPLOY_ARTIFACT_BUCKET: ${{ vars.CODEDEPLOY_ARTIFACT_BUCKET }}
      CODEDEPLOY_ARTIFACT_PREFIX: ${{ vars.CODEDEPLOY_ARTIFACT_PREFIX || 'codedeploy' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Prepare deployment artifact
        run: |
          JAR_PATH="$(ls target/*.jar | head -n 1)"
          cp "$JAR_PATH" app.jar
          sed -i 's/\r$//' appspec.yml scripts/*.sh
          chmod +x scripts/*.sh
          zip -r deploy-bundle.zip appspec.yml app.jar scripts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required CodeDeploy settings
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" || (echo "Missing secret AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "$AWS_REGION" || (echo "Missing var AWS_REGION" && exit 1)
          test -n "$CODEDEPLOY_APPLICATION_NAME" || (echo "Missing var CODEDEPLOY_APPLICATION_NAME" && exit 1)
          test -n "$CODEDEPLOY_DEPLOYMENT_GROUP" || (echo "Missing var CODEDEPLOY_DEPLOYMENT_GROUP" && exit 1)
          test -n "$CODEDEPLOY_ARTIFACT_BUCKET" || (echo "Missing var CODEDEPLOY_ARTIFACT_BUCKET" && exit 1)

      - name: Upload bundle to S3
        run: |
          set -e
          ARTIFACT_KEY="${CODEDEPLOY_ARTIFACT_PREFIX}/${GITHUB_SHA}.zip"
          aws s3 cp deploy-bundle.zip "s3://${CODEDEPLOY_ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
          echo "ARTIFACT_KEY=${ARTIFACT_KEY}" >> "$GITHUB_ENV"

      - name: Create CodeDeploy deployment
        run: |
          set -e
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "$CODEDEPLOY_APPLICATION_NAME" \
            --deployment-group-name "$CODEDEPLOY_DEPLOYMENT_GROUP" \
            --description "GitHub Actions deployment ${GITHUB_SHA}" \
            --s3-location "bucket=${CODEDEPLOY_ARTIFACT_BUCKET},bundleType=zip,key=${ARTIFACT_KEY}" \
            --query 'deploymentId' --output text)"
          echo "Created deployment: ${DEPLOYMENT_ID}"
          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"

      - name: Wait for CodeDeploy deployment
        run: |
          set -e
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"

      - name: Show CodeDeploy failure details
        if: failure()
        run: |
          set +e
          echo "Deployment ID: ${DEPLOYMENT_ID}"
          aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.{status:status,errorInformation:errorInformation,creator:creator,description:description,createTime:createTime,completeTime:completeTime}' \
            --output table

          echo "Per-instance summary:"
          aws deploy list-deployment-instances \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'instancesList' \
            --output table

          INSTANCE_ID="$(aws deploy list-deployment-instances --deployment-id "${DEPLOYMENT_ID}" --query 'instancesList[0]' --output text 2>/dev/null)"
          if [ -n "${INSTANCE_ID}" ] && [ "${INSTANCE_ID}" != "None" ]; then
            echo "First instance diagnostics:"
            aws deploy get-deployment-instance \
              --deployment-id "${DEPLOYMENT_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query 'instanceSummary.{instanceId:instanceId,status:status,lastUpdatedAt:lastUpdatedAt,lifecycleEvents:lifecycleEvents}' \
              --output json
          fi
