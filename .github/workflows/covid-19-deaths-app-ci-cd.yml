name: Covid19Map CI/CD (Docker + ECR + ECS)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_to_aws:
        description: "Build Docker image, publish to ECR and deploy to ECS"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test (Java 11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build image
        run: docker build -t covid19map:ci .

  deploy-ecs-aws:
    name: Publish image and deploy ECS
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_to_aws == 'true')
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20
    environment:
      name: production

    # UZUPEŁNIJ w GitHub -> Settings -> Secrets and variables -> Actions:
    # 1) Secret:
    #    - AWS_ROLE_TO_ASSUME -> output github_actions_role_to_assume z Terraforma.
    # 2) Vars:
    #    - AWS_REGION -> output github_actions_configuration.vars.AWS_REGION
    #    - ECR_REPOSITORY_URL -> output ecr_repository_url
    #    - ECS_CLUSTER_NAME -> output ecs_cluster_name
    #    - ECS_SERVICE_NAME -> output ecs_service_name
    #    - ECS_TASK_FAMILY -> output ecs_task_family
    #    - ECS_CONTAINER_NAME -> output ecs_container_name
    # - Utwórz Environment "production" z required reviewers dla ręcznej akceptacji deployu.
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required deployment settings
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" || (echo "Missing secret AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "$AWS_REGION" || (echo "Missing var AWS_REGION" && exit 1)
          test -n "$ECR_REPOSITORY_URL" || (echo "Missing var ECR_REPOSITORY_URL" && exit 1)
          test -n "$ECS_CLUSTER_NAME" || (echo "Missing var ECS_CLUSTER_NAME" && exit 1)
          test -n "$ECS_SERVICE_NAME" || (echo "Missing var ECS_SERVICE_NAME" && exit 1)
          test -n "$ECS_TASK_FAMILY" || (echo "Missing var ECS_TASK_FAMILY" && exit 1)
          test -n "$ECS_CONTAINER_NAME" || (echo "Missing var ECS_CONTAINER_NAME" && exit 1)

      - name: Login to Amazon ECR
        run: |
          set -e
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${ECR_REPOSITORY_URL%/*}"

      - name: Build and push Docker image
        run: |
          set -e
          IMAGE_SHA_TAG="${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          IMAGE_LATEST_TAG="${ECR_REPOSITORY_URL}:latest"
          docker build -t "${IMAGE_SHA_TAG}" -t "${IMAGE_LATEST_TAG}" .
          docker push "${IMAGE_SHA_TAG}"
          docker push "${IMAGE_LATEST_TAG}"
          echo "IMAGE_SHA_TAG=${IMAGE_SHA_TAG}" >> "$GITHUB_ENV"

      - name: Register new task definition revision
        run: |
          set -e
          CURRENT_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query 'taskDefinition' > task-def.json

          jq --arg IMG "${IMAGE_SHA_TAG}" --arg NAME "$ECS_CONTAINER_NAME" '
            .containerDefinitions |= map(if .name == $NAME then .image = $IMG else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' task-def.json > task-def-new.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-def-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "NEW_TASK_DEF_ARN=${NEW_TASK_DEF_ARN}" >> "$GITHUB_ENV"

      - name: Deploy new task definition to ECS service
        run: |
          set -e
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment >/dev/null
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME"
